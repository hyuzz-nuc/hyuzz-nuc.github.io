{{- define "main" }}

<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">📁 文章归档</h1>
  </header>

  <div class="archive-content">
    {{- range .Site.RegularPages.GroupByDate "2006" }}
    <div class="archive-year">
      <h2 class="archive-year-title">{{ .Key }} 年</h2>
      <ul class="archive-month-list">
        {{- range .Pages.GroupByDate "2006-01" }}
        <li class="archive-month">
          <span class="archive-month-name">{{ .Key }}</span>
          <ul class="archive-post-list">
            {{- range .Pages }}
            <li>
              <span class="archive-post-date">{{ .Date.Format "01/02" }}</span>
              <a href="{{ .Permalink }}" class="archive-post-title">{{ .Title }}</a>
            </li>
            {{- end }}
          </ul>
        </li>
        {{- end }}
      </ul>
    </div>
    {{- end }}
  </div>
</article>

{{- end }}
