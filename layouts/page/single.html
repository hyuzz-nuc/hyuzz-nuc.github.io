{{- define "main" }}

<!-- 左右分栏布局 -->
<div class="home-layout">
  
  <!-- 左侧页面内容 -->
  <main class="main-content">
    <article class="post-single">
      <header class="post-header">
        <h1 class="post-title">{{ .Title }}</h1>
      </header>

      <div class="post-content">
        {{ .Content }}
      </div>
    </article>
  </main>

  <!-- 右侧边栏 -->
  {{- partial "sidebar-right.html" . }}
</div>

<!-- 微信二维码弹窗 -->
<div id="wechat-modal" class="modal" onclick="hideWechatQR()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <span class="modal-close" onclick="hideWechatQR()">&times;</span>
    <h4>微信扫一扫</h4>
    <img src="/images/wechat-qrcode.png" alt="微信二维码" class="wechat-qr">
    <p>加我好友，一起交流学习～</p>
  </div>
</div>

<script>
  function showWechatQR() {
    document.getElementById('wechat-modal').style.display = 'flex';
  }

  function hideWechatQR() {
    document.getElementById('wechat-modal').style.display = 'none';
  }
</script>

{{- end }}
