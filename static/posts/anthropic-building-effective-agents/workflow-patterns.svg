<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="system-ui,-apple-system,sans-serif"><rect width="800" height="460" fill="#0d1117" rx="12"/><text x="400" y="35" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold">Anthropic 五种 Workflow 模式</text><rect x="20" y="55" width="240" height="120" rx="8" fill="#1f2937" stroke="#ef4444" stroke-width="1.5"/><text x="140" y="78" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold">提示链</text><text x="140" y="95" text-anchor="middle" fill="#8b949e" font-size="9">Prompt Chaining</text><text x="35" y="115" fill="#c9d1d9" font-size="10">A - gate - B - gate - C</text><text x="35" y="133" fill="#8b949e" font-size="9">任务拆成固定步骤顺序执行</text><text x="35" y="150" fill="#8b949e" font-size="9">适用：生成文案-翻译-审核</text><text x="35" y="167" fill="#58a6ff" font-size="9">关键：每步可加检查点</text><rect x="280" y="55" width="240" height="120" rx="8" fill="#1f2937" stroke="#f7b731" stroke-width="1.5"/><text x="400" y="78" text-anchor="middle" fill="#f7b731" font-size="13" font-weight="bold">路由分发</text><text x="400" y="95" text-anchor="middle" fill="#8b949e" font-size="9">Routing</text><text x="295" y="115" fill="#c9d1d9" font-size="10">Input - 分类器 - A/B/C</text><text x="295" y="133" fill="#8b949e" font-size="9">不同类型走不同处理流程</text><text x="295" y="150" fill="#8b949e" font-size="9">适用：客服分类-退款/技术/咨询</text><text x="295" y="167" fill="#58a6ff" font-size="9">关键：分类准确度决定效果</text><rect x="540" y="55" width="240" height="120" rx="8" fill="#1f2937" stroke="#26de81" stroke-width="1.5"/><text x="660" y="78" text-anchor="middle" fill="#26de81" font-size="13" font-weight="bold">并行化</text><text x="660" y="95" text-anchor="middle" fill="#8b949e" font-size="9">Parallelization</text><text x="555" y="115" fill="#c9d1d9" font-size="10">Input - [A|B|C] - 聚合</text><text x="555" y="133" fill="#8b949e" font-size="9">分段执行或多次投票</text><text x="555" y="150" fill="#8b949e" font-size="9">适用：内容审核+核心回复并行</text><text x="555" y="167" fill="#58a6ff" font-size="9">关键：子任务必须互相独立</text><rect x="20" y="190" width="375" height="120" rx="8" fill="#1f2937" stroke="#4b7bec" stroke-width="1.5"/><text x="208" y="213" text-anchor="middle" fill="#4b7bec" font-size="13" font-weight="bold">编排-执行</text><text x="208" y="230" text-anchor="middle" fill="#8b949e" font-size="9">Orchestrator-Workers</text><text x="35" y="250" fill="#c9d1d9" font-size="10">Orchestrator 动态拆任务-Worker-汇总</text><text x="35" y="268" fill="#8b949e" font-size="9">子任务数量和类型由 LLM 动态决定</text><text x="35" y="285" fill="#8b949e" font-size="9">适用：代码修改多文件、多源搜索</text><text x="35" y="300" fill="#58a6ff" font-size="9">关键：灵活性强，但开销更大</text><rect x="415" y="190" width="365" height="120" rx="8" fill="#1f2937" stroke="#a55eea" stroke-width="1.5"/><text x="598" y="213" text-anchor="middle" fill="#a55eea" font-size="13" font-weight="bold">评估-优化</text><text x="598" y="230" text-anchor="middle" fill="#8b949e" font-size="9">Evaluator-Optimizer</text><text x="430" y="250" fill="#c9d1d9" font-size="10">生成-评估-反馈-再生成-输出</text><text x="430" y="268" fill="#8b949e" font-size="9">一个 LLM 生成，另一个评估给反馈</text><text x="430" y="285" fill="#8b949e" font-size="9">适用：文学翻译、复杂搜索</text><text x="430" y="300" fill="#58a6ff" font-size="9">关键：必须有明确评估标准</text><text x="400" y="350" text-anchor="middle" fill="#8b949e" font-size="11">复杂度递增</text><rect x="80" y="365" width="640" height="8" rx="4" fill="#21262d"/><rect x="80" y="365" width="128" height="8" rx="4" fill="#ef4444"/><rect x="208" y="365" width="128" height="8" fill="#f7b731"/><rect x="336" y="365" width="128" height="8" fill="#26de81"/><rect x="464" y="365" width="128" height="8" fill="#4b7bec"/><rect x="592" y="365" width="128" height="8" rx="4" fill="#a55eea"/><text x="144" y="390" text-anchor="middle" fill="#ef4444" font-size="9">提示链</text><text x="272" y="390" text-anchor="middle" fill="#f7b731" font-size="9">路由</text><text x="400" y="390" text-anchor="middle" fill="#26de81" font-size="9">并行化</text><text x="528" y="390" text-anchor="middle" fill="#4b7bec" font-size="9">编排</text><text x="656" y="390" text-anchor="middle" fill="#a55eea" font-size="9">评估</text><rect x="80" y="410" width="640" height="40" rx="8" fill="#1f2937" stroke="#30363d"/><text x="400" y="435" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">核心原则：用最简单的方案解决问题，不够再加复杂度</text></svg>