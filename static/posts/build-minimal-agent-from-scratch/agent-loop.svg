<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="system-ui,-apple-system,sans-serif"><rect width="700" height="340" fill="#0d1117" rx="12"/><text x="350" y="35" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold">Agent 核心循环：Think → Act → Observe</text><rect x="30" y="60" width="180" height="100" rx="10" fill="#1f2937" stroke="#4b7bec" stroke-width="2"/><text x="120" y="95" text-anchor="middle" fill="#4b7bec" font-size="16" font-weight="bold">Think</text><text x="120" y="118" text-anchor="middle" fill="#8b949e" font-size="10">调用 LLM</text><text x="120" y="135" text-anchor="middle" fill="#8b949e" font-size="10">决定下一步</text><rect x="260" y="60" width="180" height="100" rx="10" fill="#1f2937" stroke="#26de81" stroke-width="2"/><text x="350" y="95" text-anchor="middle" fill="#26de81" font-size="16" font-weight="bold">Act</text><text x="350" y="118" text-anchor="middle" fill="#8b949e" font-size="10">执行工具</text><text x="350" y="135" text-anchor="middle" fill="#8b949e" font-size="10">search / calc / read</text><rect x="490" y="60" width="180" height="100" rx="10" fill="#1f2937" stroke="#f7b731" stroke-width="2"/><text x="580" y="95" text-anchor="middle" fill="#f7b731" font-size="16" font-weight="bold">Observe</text><text x="580" y="118" text-anchor="middle" fill="#8b949e" font-size="10">工具结果喂回</text><text x="580" y="135" text-anchor="middle" fill="#8b949e" font-size="10">更新 messages</text><defs><marker id="a1" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#58a6ff"/></marker><marker id="a2" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#58a6ff"/></marker></defs><line x1="210" y1="110" x2="255" y2="110" stroke="#58a6ff" stroke-width="2" marker-end="url(#a1)"/><line x1="440" y1="110" x2="485" y2="110" stroke="#58a6ff" stroke-width="2" marker-end="url(#a2)"/><path d="M580 160 Q580 230 350 230 Q120 230 120 165" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#a1)"/><text x="350" y="250" text-anchor="middle" fill="#ef4444" font-size="11">循环，直到 LLM 给出最终答案或达到最大步数</text><rect x="50" y="275" width="600" height="50" rx="8" fill="#1f2937" stroke="#30363d"/><text x="350" y="300" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">安全机制：max_steps 限制 + try/except 错误处理</text><text x="350" y="318" text-anchor="middle" fill="#8b949e" font-size="9">防止无限循环和崩溃</text></svg>