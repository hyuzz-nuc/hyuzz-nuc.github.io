<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="system-ui,-apple-system,sans-serif">
  <rect width="700" height="400" fill="#0d1117" rx="12"/>
  <text x="350" y="34" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold">Multi-Agent 协作架构</text>
  <!-- 用户 -->
  <rect x="290" y="50" width="120" height="40" rx="8" fill="#1f2937" stroke="#8b949e" stroke-width="1.5"/>
  <text x="350" y="75" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="bold">用户需求</text>
  <!-- 编排器 -->
  <rect x="270" y="130" width="160" height="45" rx="10" fill="#1f2937" stroke="#f59e0b" stroke-width="2"/>
  <text x="350" y="157" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold">Orchestrator 编排器</text>
  <!-- 箭头：用户到编排器 -->
  <defs><marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#58a6ff"/></marker></defs>
  <line x1="350" y1="90" x2="350" y2="128" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#a2)"/>
  <!-- Agent 1: 产品经理 -->
  <rect x="30" y="220" width="140" height="80" rx="10" fill="#1f2937" stroke="#3b82f6" stroke-width="2"/>
  <text x="100" y="248" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="bold">Agent 1</text>
  <text x="100" y="268" text-anchor="middle" fill="#c9d1d9" font-size="11">产品经理</text>
  <text x="100" y="288" text-anchor="middle" fill="#8b949e" font-size="9">需求分析 / PRD</text>
  <!-- Agent 2: 架构师 -->
  <rect x="195" y="220" width="140" height="80" rx="10" fill="#1f2937" stroke="#10b981" stroke-width="2"/>
  <text x="265" y="248" text-anchor="middle" fill="#10b981" font-size="12" font-weight="bold">Agent 2</text>
  <text x="265" y="268" text-anchor="middle" fill="#c9d1d9" font-size="11">架构师</text>
  <text x="265" y="288" text-anchor="middle" fill="#8b949e" font-size="9">系统设计 / API</text>
  <!-- Agent 3: 开发者 -->
  <rect x="365" y="220" width="140" height="80" rx="10" fill="#1f2937" stroke="#f59e0b" stroke-width="2"/>
  <text x="435" y="248" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">Agent 3</text>
  <text x="435" y="268" text-anchor="middle" fill="#c9d1d9" font-size="11">开发者</text>
  <text x="435" y="288" text-anchor="middle" fill="#8b949e" font-size="9">编码实现</text>
  <!-- Agent 4: 测试 -->
  <rect x="530" y="220" width="140" height="80" rx="10" fill="#1f2937" stroke="#ef4444" stroke-width="2"/>
  <text x="600" y="248" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">Agent 4</text>
  <text x="600" y="268" text-anchor="middle" fill="#c9d1d9" font-size="11">测试工程师</text>
  <text x="600" y="288" text-anchor="middle" fill="#8b949e" font-size="9">质量验证</text>
  <!-- 编排器到各 Agent 的箭头 -->
  <line x1="310" y1="175" x2="100" y2="218" stroke="#58a6ff" stroke-width="1" marker-end="url(#a2)"/>
  <line x1="330" y1="175" x2="265" y2="218" stroke="#58a6ff" stroke-width="1" marker-end="url(#a2)"/>
  <line x1="380" y1="175" x2="435" y2="218" stroke="#58a6ff" stroke-width="1" marker-end="url(#a2)"/>
  <line x1="400" y1="175" x2="600" y2="218" stroke="#58a6ff" stroke-width="1" marker-end="url(#a2)"/>
  <!-- Agent 间通信 -->
  <line x1="170" y1="260" x2="195" y2="260" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#a2)"/>
  <line x1="335" y1="260" x2="365" y2="260" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#a2)"/>
  <line x1="505" y1="260" x2="530" y2="260" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#a2)"/>
  <text x="183" y="252" text-anchor="middle" fill="#a855f7" font-size="8">通信</text>
  <text x="350" y="252" text-anchor="middle" fill="#a855f7" font-size="8">通信</text>
  <text x="518" y="252" text-anchor="middle" fill="#a855f7" font-size="8">通信</text>
  <!-- 共享记忆 -->
  <rect x="200" y="340" width="300" height="35" rx="8" fill="#1f2937" stroke="#a855f7" stroke-width="1.5"/>
  <text x="350" y="363" text-anchor="middle" fill="#a855f7" font-size="11" font-weight="bold">共享记忆 / 消息总线 / 黑板系统</text>
  <!-- Agent 到共享记忆 -->
  <line x1="100" y1="300" x2="250" y2="338" stroke="#a855f7" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="265" y1="300" x2="300" y2="338" stroke="#a855f7" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="435" y1="300" x2="400" y2="338" stroke="#a855f7" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="600" y1="300" x2="450" y2="338" stroke="#a855f7" stroke-width="0.8" stroke-dasharray="3,2"/>
</svg>