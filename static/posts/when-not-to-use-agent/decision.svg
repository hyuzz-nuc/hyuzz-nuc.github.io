<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="system-ui,-apple-system,sans-serif">
  <rect width="800" height="420" fill="#0d1117" rx="12"/>
  <text x="400" y="36" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold">什么时候不该用 Agent？</text>
  <!-- 左侧：不需要 Agent -->
  <rect x="20" y="60" width="370" height="320" rx="10" fill="#1f2937" stroke="#10b981" stroke-width="2"/>
  <text x="205" y="90" text-anchor="middle" fill="#10b981" font-size="15" font-weight="bold">✅ 不需要 Agent</text>
  <line x1="40" y1="105" x2="370" y2="105" stroke="#30363d"/>
  <text x="40" y="130" fill="#c9d1d9" font-size="12" font-weight="bold">1. 任务可预测</text>
  <text x="55" y="150" fill="#8b949e" font-size="10">流程固定，输入输出明确</text>
  <text x="55" y="167" fill="#8b949e" font-size="10">例：每天定时生成报表</text>
  <text x="40" y="195" fill="#c9d1d9" font-size="12" font-weight="bold">2. 流程稳定</text>
  <text x="55" y="215" fill="#8b949e" font-size="10">不需要动态决策，按步骤走就行</text>
  <text x="55" y="232" fill="#8b949e" font-size="10">例：RAG 知识库问答</text>
  <text x="40" y="260" fill="#c9d1d9" font-size="12" font-weight="bold">3. 脚本能解决</text>
  <text x="55" y="280" fill="#8b949e" font-size="10">确定性逻辑，不需要 AI 判断</text>
  <text x="55" y="297" fill="#8b949e" font-size="10">例：批量重命名文件</text>
  <text x="40" y="325" fill="#c9d1d9" font-size="12" font-weight="bold">4. 成本敏感</text>
  <text x="55" y="345" fill="#8b949e" font-size="10">Agent Token 消耗是 Workflow 的 3-10 倍</text>
  <text x="55" y="362" fill="#8b949e" font-size="10">例：高并发客服场景</text>
  <!-- 右侧：需要 Agent -->
  <rect x="410" y="60" width="370" height="320" rx="10" fill="#1f2937" stroke="#ef4444" stroke-width="2"/>
  <text x="595" y="90" text-anchor="middle" fill="#ef4444" font-size="15" font-weight="bold">⚠️ 需要 Agent</text>
  <line x1="430" y1="105" x2="760" y2="105" stroke="#30363d"/>
  <text x="430" y="130" fill="#c9d1d9" font-size="12" font-weight="bold">1. 任务不可预测</text>
  <text x="445" y="150" fill="#8b949e" font-size="10">路径取决于中间结果</text>
  <text x="445" y="167" fill="#8b949e" font-size="10">例：研究分析，方向随发现而变</text>
  <text x="430" y="195" fill="#c9d1d9" font-size="12" font-weight="bold">2. 需要动态决策</text>
  <text x="445" y="215" fill="#8b949e" font-size="10">每一步做什么，需要 AI 判断</text>
  <text x="445" y="232" fill="#8b949e" font-size="10">例：自动化调试，策略随报错而变</text>
  <text x="430" y="260" fill="#c9d1d9" font-size="12" font-weight="bold">3. 需要多工具协作</text>
  <text x="445" y="280" fill="#8b949e" font-size="10">根据情况选择不同工具组合</text>
  <text x="445" y="297" fill="#8b949e" font-size="10">例：搜索+分析+代码执行</text>
  <text x="430" y="325" fill="#c9d1d9" font-size="12" font-weight="bold">4. 需要反思和纠错</text>
  <text x="445" y="345" fill="#8b949e" font-size="10">执行结果不对，需要调整策略</text>
  <text x="445" y="362" fill="#8b949e" font-size="10">例：代码生成→测试→修复→再测试</text>
  <!-- 底部 -->
  <rect x="200" y="395" width="400" height="18" rx="4" fill="#f59e0b" opacity="0.15"/>
  <text x="400" y="408" text-anchor="middle" fill="#f59e0b" font-size="11">原则：能用简单方案解决，就不要用复杂方案</text>
</svg>