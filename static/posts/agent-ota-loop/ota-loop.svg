<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" font-family="system-ui,-apple-system,sans-serif">
  <rect width="640" height="520" fill="#0d1117" rx="12"/>
  <text x="320" y="38" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold">Agent 基本循环：Observe → Think → Act</text>
  <!-- 中心圆 - 循环指示 -->
  <circle cx="320" cy="280" r="180" fill="none" stroke="#30363d" stroke-width="1.5" stroke-dasharray="8,4"/>
  <!-- Observe -->
  <rect x="230" y="80" width="180" height="70" rx="12" fill="#1f2937" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="320" y="110" text-anchor="middle" fill="#3b82f6" font-size="18" font-weight="bold">Observe</text>
  <text x="320" y="132" text-anchor="middle" fill="#8b949e" font-size="11">观察：感知环境和反馈</text>
  <!-- Think -->
  <rect x="40" y="300" width="180" height="70" rx="12" fill="#1f2937" stroke="#10b981" stroke-width="2.5"/>
  <text x="130" y="330" text-anchor="middle" fill="#10b981" font-size="18" font-weight="bold">Think</text>
  <text x="130" y="352" text-anchor="middle" fill="#8b949e" font-size="11">思考：推理和规划</text>
  <!-- Act -->
  <rect x="420" y="300" width="180" height="70" rx="12" fill="#1f2937" stroke="#ef4444" stroke-width="2.5"/>
  <text x="510" y="330" text-anchor="middle" fill="#ef4444" font-size="18" font-weight="bold">Act</text>
  <text x="510" y="352" text-anchor="middle" fill="#8b949e" font-size="11">行动：执行和工具调用</text>
  <!-- 箭头：Observe → Think -->
  <defs><marker id="a3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#58a6ff"/></marker></defs>
  <path d="M280 150 Q200 200 150 298" fill="none" stroke="#58a6ff" stroke-width="2" marker-end="url(#a3)"/>
  <text x="185" y="220" text-anchor="middle" fill="#58a6ff" font-size="10" transform="rotate(-40,185,220)">输入信息</text>
  <!-- 箭头：Think → Act -->
  <path d="M220 335 Q320 390 420 335" fill="none" stroke="#58a6ff" stroke-width="2" marker-end="url(#a3)"/>
  <text x="320" y="380" text-anchor="middle" fill="#58a6ff" font-size="10">决策指令</text>
  <!-- 箭头：Act → Observe（反馈循环） -->
  <path d="M510 300 Q510 160 410 115" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#a3)"/>
  <text x="490" y="200" text-anchor="middle" fill="#f59e0b" font-size="10" transform="rotate(70,490,200)">观察反馈</text>
  <!-- 循环标识 -->
  <text x="320" y="290" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">循环</text>
  <text x="320" y="306" text-anchor="middle" fill="#8b949e" font-size="10">直到任务完成</text>
  <!-- 底部说明 -->
  <rect x="40" y="420" width="560" height="80" rx="8" fill="#1f2937" stroke="#30363d"/>
  <text x="320" y="445" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="bold">每个阶段的核心任务</text>
  <text x="130" y="468" text-anchor="middle" fill="#3b82f6" font-size="10">Observe: 读取输入、工具返回、环境状态</text>
  <text x="130" y="488" text-anchor="middle" fill="#10b981" font-size="10">Think: 分析信息、制定计划、选择工具</text>
  <text x="430" y="468" text-anchor="middle" fill="#ef4444" font-size="10">Act: 调用工具、执行操作、输出结果</text>
  <text x="430" y="488" text-anchor="middle" fill="#f59e0b" font-size="10">Loop: 观察结果 → 继续或结束</text>
</svg>