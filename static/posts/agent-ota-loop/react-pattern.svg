<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="system-ui,-apple-system,sans-serif">
  <rect width="800" height="360" fill="#0d1117" rx="12"/>
  <text x="400" y="34" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">ReAct 模式展开：思考与行动交替进行</text>
  <!-- 步骤 1: Thought -->
  <rect x="20" y="60" width="150" height="90" rx="8" fill="#1f2937" stroke="#10b981" stroke-width="2"/>
  <text x="95" y="85" text-anchor="middle" fill="#10b981" font-size="13" font-weight="bold">Thought 1</text>
  <text x="95" y="105" text-anchor="middle" fill="#c9d1d9" font-size="10">我需要查一下</text>
  <text x="95" y="120" text-anchor="middle" fill="#c9d1d9" font-size="10">北京今天的天气</text>
  <text x="95" y="140" text-anchor="middle" fill="#8b949e" font-size="9">推理：分解问题</text>
  <!-- 箭头 -->
  <defs><marker id="a4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#58a6ff"/></marker></defs>
  <line x1="170" y1="105" x2="195" y2="105" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#a4)"/>
  <!-- 步骤 2: Action -->
  <rect x="195" y="60" width="150" height="90" rx="8" fill="#1f2937" stroke="#ef4444" stroke-width="2"/>
  <text x="270" y="85" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold">Action 1</text>
  <text x="270" y="105" text-anchor="middle" fill="#c9d1d9" font-size="10">调用天气 API</text>
  <text x="270" y="120" text-anchor="middle" fill="#c9d1d9" font-size="10">city=北京</text>
  <text x="270" y="140" text-anchor="middle" fill="#8b949e" font-size="9">执行：调用工具</text>
  <!-- 箭头 -->
  <line x1="345" y1="105" x2="370" y2="105" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#a4)"/>
  <!-- 步骤 3: Observation -->
  <rect x="370" y="60" width="150" height="90" rx="8" fill="#1f2937" stroke="#3b82f6" stroke-width="2"/>
  <text x="445" y="85" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="bold">Observation 1</text>
  <text x="445" y="105" text-anchor="middle" fill="#c9d1d9" font-size="10">28°C 晴</text>
  <text x="445" y="120" text-anchor="middle" fill="#c9d1d9" font-size="10">东南风 3 级</text>
  <text x="445" y="140" text-anchor="middle" fill="#8b949e" font-size="9">观察：获取结果</text>
  <!-- 箭头 -->
  <line x1="520" y1="105" x2="545" y2="105" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#a4)"/>
  <!-- 步骤 4: Thought 2 -->
  <rect x="545" y="60" width="150" height="90" rx="8" fill="#1f2937" stroke="#10b981" stroke-width="2"/>
  <text x="620" y="85" text-anchor="middle" fill="#10b981" font-size="13" font-weight="bold">Thought 2</text>
  <text x="620" y="105" text-anchor="middle" fill="#c9d1d9" font-size="10">已获取天气</text>
  <text x="620" y="120" text-anchor="middle" fill="#c9d1d9" font-size="10">可以回答用户了</text>
  <text x="620" y="140" text-anchor="middle" fill="#8b949e" font-size="9">推理：判断完成</text>
  <!-- 第二行：最终输出 -->
  <line x1="620" y1="150" x2="620" y2="185" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#a4)"/>
  <rect x="420" y="185" width="280" height="60" rx="8" fill="#1f2937" stroke="#a855f7" stroke-width="2"/>
  <text x="560" y="212" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold">Final Answer</text>
  <text x="560" y="232" text-anchor="middle" fill="#c9d1d9" font-size="11">北京今天 28°C，晴天，东南风 3 级</text>
  <!-- 底部对比 -->
  <rect x="20" y="270" width="760" height="75" rx="8" fill="#1f2937" stroke="#30363d"/>
  <text x="400" y="293" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="bold">与纯推理 / 纯行动的对比</text>
  <text x="160" y="316" text-anchor="middle" fill="#10b981" font-size="11">纯推理（CoT）</text>
  <text x="160" y="335" text-anchor="middle" fill="#8b949e" font-size="9">只思考不行动，无法获取新信息</text>
  <text x="400" y="316" text-anchor="middle" fill="#ef4444" font-size="11">纯行动（Act-only）</text>
  <text x="400" y="335" text-anchor="middle" fill="#8b949e" font-size="9">只执行不思考，容易走错方向</text>
  <text x="640" y="316" text-anchor="middle" fill="#a855f7" font-size="11">ReAct（推理+行动）</text>
  <text x="640" y="335" text-anchor="middle" fill="#8b949e" font-size="9">思考指导行动，行动反馈思考</text>
</svg>