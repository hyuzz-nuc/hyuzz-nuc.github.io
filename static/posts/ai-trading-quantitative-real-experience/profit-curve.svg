<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect fill="#0f0f23" width="800" height="400"/>
  
  <!-- Title -->
  <text x="40" y="30" fill="#00ff88" font-size="16" font-weight="bold">📈 三个月收益曲线（单位：万元）</text>
  
  <!-- Grid lines -->
  <line x1="40" y1="60" x2="40" y2="360" stroke="#333" stroke-width="2"/>
  <line x1="40" y1="360" x2="760" y2="360" stroke="#333" stroke-width="2"/>
  
  <!-- Y axis labels -->
  <text x="35" y="365" fill="#888" font-size="10">9</text>
  <text x="35" y="285" fill="#888" font-size="10">10</text>
  <text x="35" y="205" fill="#888" font-size="10">11</text>
  <text x="35" y="125" fill="#888" font-size="10">12</text>
  <text x="35" y="65" fill="#888" font-size="10">13</text>
  
  <!-- Grid -->
  <line x1="40" y1="280" x2="760" y2="280" stroke="#222" stroke-width="1"/>
  <line x1="40" y1="200" x2="760" y2="200" stroke="#222" stroke-width="1"/>
  <line x1="40" y1="120" x2="760" y2="120" stroke="#222" stroke-width="1"/>
  
  <!-- X axis labels -->
  <text x="100" y="380" fill="#888" font-size="10">第 1 周</text>
  <text x="250" y="380" fill="#888" font-size="10">第 1 月</text>
  <text x="400" y="380" fill="#888" font-size="10">第 2 月</text>
  <text x="550" y="380" fill="#888" font-size="10">第 3 月</text>
  
  <!-- Data line -->
  <polyline points="100,320 150,280 200,360 250,320 350,280 450,200 550,120 700,80" 
            fill="none" stroke="#00ff88" stroke-width="3"/>
  
  <!-- Data points -->
  <circle cx="100" cy="320" r="4" fill="#00ff88"/>
  <circle cx="250" cy="320" r="4" fill="#ff4444"/>
  <circle cx="400" cy="280" r="4" fill="#00ff88"/>
  <circle cx="700" cy="80" r="4" fill="#00ff88"/>
  
  <!-- Labels -->
  <text x="250" y="340" fill="#ff4444" font-size="10">-8%</text>
  <text x="400" y="260" fill="#00ff88" font-size="10">+5%</text>
  <text x="700" y="60" fill="#00ff88" font-size="12" font-weight="bold">+30%</text>
</svg>
