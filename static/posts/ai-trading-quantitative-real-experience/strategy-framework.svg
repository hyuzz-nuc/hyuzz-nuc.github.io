<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect fill="#0f0f23" width="800" height="500"/>
  
  <!-- Title -->
  <text x="40" y="30" fill="#00aaff" font-size="16" font-weight="bold">🤖 我的 AI 量化策略框架</text>
  
  <!-- Data layer -->
  <rect x="40" y="50" width="720" height="80" fill="#1a1a3e" stroke="#00aaff" stroke-width="2" rx="5"/>
  <text x="400" y="75" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">数据层</text>
  <text x="400" y="100" fill="#888" font-size="11" text-anchor="middle">Tushare 行情数据 | 聚宽分钟线 | 东方财富财务数据 | 自建新闻舆情爬虫</text>
  <text x="400" y="120" fill="#888" font-size="11" text-anchor="middle">数据清洗 → 特征工程 → 存储到 MySQL</text>
  
  <!-- Model layer -->
  <rect x="40" y="160" width="720" height="100" fill="#1a1a3e" stroke="#00ff88" stroke-width="2" rx="5"/>
  <text x="400" y="185" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">模型层</text>
  <text x="400" y="210" fill="#888" font-size="11" text-anchor="middle">随机森林分类器 | LSTM 时序模型 | XGBoost 回归</text>
  <text x="400" y="235" fill="#888" font-size="11" text-anchor="middle">特征：MA5/MA20/RSI/MACD/成交量/情绪指标</text>
  <text x="400" y="250" fill="#888" font-size="11" text-anchor="middle">输出：买入信号 (0.8)/持有信号 (0.5)/卖出信号 (0.2)</text>
  
  <!-- Strategy layer -->
  <rect x="40" y="290" width="720" height="100" fill="#1a1a3e" stroke="#ffaa00" stroke-width="2" rx="5"/>
  <text x="400" y="315" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">策略层</text>
  <text x="200" y="345" fill="#888" font-size="11" text-anchor="middle">趋势策略 (40%)</text>
  <text x="400" y="345" fill="#888" font-size="11" text-anchor="middle">均值回归 (30%)</text>
  <text x="600" y="345" fill="#888" font-size="11" text-anchor="middle">打新策略 (30%)</text>
  <text x="400" y="375" fill="#888" font-size="11" text-anchor="middle">仓位控制：单只≤10% | 单行业≤30% | 总仓位≤80%</text>
  
  <!-- Execution layer -->
  <rect x="40" y="420" width="720" height="60" fill="#1a1a3e" stroke="#ff4444" stroke-width="2" rx="5"/>
  <text x="400" y="440" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">执行层</text>
  <text x="400" y="465" fill="#888" font-size="11" text-anchor="middle">自动交易 API | 止损 -5% | 止盈 +15% | 滑点控制</text>
  
  <!-- Arrows -->
  <line x1="400" y1="130" x2="400" y2="160" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="260" x2="400" y2="290" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="390" x2="400" y2="420" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#666"/>
    </marker>
  </defs>
</svg>
